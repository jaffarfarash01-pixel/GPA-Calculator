<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <h2>CGPA Calculator</h2>
      <input type="text" id="sem" placeholder="Sem 1" />
      <input type="number" id="SGPA" placeholder="SGPA" />
      <input type="number" id="credits" placeholder="credits" />

      <button id="add-btn">add</button>
    </div>

    <div id="table-container">
      <table>
        <thead>
          <tr>
            <td>SEM</td>
            <td>SGPA</td>
            <td>CREDITS</td>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <br />
    <button onclick="calculateCGPA(store)" id="calculate-btn">
      calculate CGPA
    </button>
    <br />
    <h3>CGPA: <span id="output">0.00</span></h3>
    <script src="CGPA.js"></script>
  </body>
</html>
